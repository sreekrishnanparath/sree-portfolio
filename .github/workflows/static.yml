# Deploy with GitHub Actions — no gh-pages branch needed.
#
# After pushing: Repo → Settings → Pages → Build and deployment → Source → GitHub Actions
# (Pick this workflow if GitHub shows a list.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            export VITE_BASE_PATH="/"
          else
            export VITE_BASE_PATH="/${REPO_NAME}/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          npm run build

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
