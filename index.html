<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Custom domain serves this site at / ; /sree-portfolio/ breaks relative ./assets URLs — send users to /. -->
    <script>
      (function () {
        try {
          var h = location.hostname;
          if (h.endsWith('github.io')) return;
          var repo = '/sree-portfolio';
          var p = location.pathname;
          if (p === repo || p.startsWith(repo + '/')) {
            var tail = p === repo ? '/' : p.slice(repo.length);
            location.replace(location.origin + tail + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sreekrishnan Radhakrishnan — Senior Software Engineer in Dublin. Distributed systems, AdTech, and cloud-native platforms." />
    <title>Sreekrishnan Radhakrishnan | Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
